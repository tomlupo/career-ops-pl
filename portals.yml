# Portal Scanner Configuration
# Tailored for Sara Wilczega -- PR & Communications Specialist
# Focus: PR, Communications, Public Affairs roles in Poland and EU

# -- Title filter --
title_filter:
  positive:
    # -- PR/Communications roles (EN) --
    - "PR"
    - "Public Relations"
    - "Communications"
    - "Comms"
    - "Spokesperson"
    - "Press"
    - "Media Relations"
    - "Corporate Affairs"
    - "Public Affairs"
    - "Government Relations"
    - "External Relations"
    - "Internal Communications"
    - "Crisis"
    - "Reputation"
    - "Content"
    - "Social Media Manager"
    - "Marketing Communications"
    - "Brand Manager"
    - "Editorial"
    - "Copywriter"
    # -- PR/Communications roles (PL) --
    - "Rzecznik"
    - "Komunikacja"
    - "Relacje z mediami"
    - "Relacje publiczne"
    - "Biuro prasowe"
    - "Specjalista ds. PR"
    - "Specjalista ds. komunikacji"
    - "Media"
    - "Rzecznik prasowy"
  negative:
    - "Junior"
    - "Intern"
    - "Stażysta"
    - "Praktykant"
    - "Developer"
    - "Engineer"
    - "Programista"
    - "DevOps"
    - "QA"
    - "Tester"
    - "Data Analyst"
    - "Accountant"
    - "Księgowy"
    - "Sales Rep"
    - "Customer Service"
    - "Graphic Designer"
  seniority_boost:
    - "Senior"
    - "Head"
    - "Director"
    - "Lead"
    - "Manager"
    - "Dyrektor"
    - "Kierownik"
    - "Starszy"

# -- Search queries --
search_queries:

  # -- Pracuj.pl (primary Polish portal) --
  - name: Pracuj.pl — PR Manager
    query: 'site:pracuj.pl "PR Manager" OR "Head of PR" OR "Public Relations Manager"'
    enabled: true

  - name: Pracuj.pl — Communications (EN)
    query: 'site:pracuj.pl "Communications Manager" OR "Head of Communications" OR "Communications Director"'
    enabled: true

  - name: Pracuj.pl — PR Specialist (PL)
    query: 'site:pracuj.pl "specjalista ds. PR" OR "specjalista ds. komunikacji" OR "rzecznik prasowy" OR "kierownik ds. komunikacji"'
    enabled: true

  - name: Pracuj.pl — Public Affairs
    query: 'site:pracuj.pl "Public Affairs" OR "Government Relations" OR "relacje instytucjonalne" OR "Corporate Affairs"'
    enabled: true

  - name: Pracuj.pl — MarCom
    query: 'site:pracuj.pl "Marketing Communications" OR "Brand Manager" OR "Social Media Manager" Warszawa OR remote'
    enabled: true

  # -- LinkedIn --
  - name: LinkedIn — PR Manager Poland
    query: 'site:linkedin.com/jobs "PR Manager" OR "Head of PR" OR "Public Relations Manager" Poland OR Warsaw'
    enabled: true

  - name: LinkedIn — Communications Director
    query: 'site:linkedin.com/jobs "Communications Director" OR "Head of Communications" OR "VP Communications" Poland OR remote'
    enabled: true

  - name: LinkedIn — Corporate Comms
    query: 'site:linkedin.com/jobs "Corporate Communications" OR "External Communications" OR "Internal Communications" Warsaw OR Poland'
    enabled: true

  - name: LinkedIn — Spokesperson & Press
    query: 'site:linkedin.com/jobs "Spokesperson" OR "Press Officer" OR "Media Relations" Poland OR EU OR remote'
    enabled: true

  - name: LinkedIn — Public Affairs EU
    query: 'site:linkedin.com/jobs "Public Affairs" OR "Government Relations" OR "EU Affairs" Brussels OR Warsaw OR Poland'
    enabled: true

  # -- Greenhouse (international companies) --
  - name: Greenhouse — Communications
    query: 'site:job-boards.greenhouse.io "Communications Manager" OR "Head of Communications" OR "PR Manager" Europe OR remote'
    enabled: true

  - name: Greenhouse — Public Affairs
    query: 'site:job-boards.greenhouse.io "Public Affairs" OR "Government Relations" OR "Policy Communications" Europe OR remote'
    enabled: true

  # -- Ashby (tech companies with comms roles) --
  - name: Ashby — Communications
    query: 'site:jobs.ashbyhq.com "Communications" OR "PR" OR "Public Relations" Europe OR remote'
    enabled: true

  # -- Lever --
  - name: Lever — Communications
    query: 'site:jobs.lever.co "Communications Manager" OR "PR Manager" OR "Head of Communications" Europe OR remote'
    enabled: true

  # -- NoFluffJobs (Polish tech job portal) --
  - name: NoFluffJobs — Communications
    query: 'site:nofluffjobs.com "PR" OR "Communications" OR "Marketing" Warszawa OR remote'
    enabled: true

  # -- Indeed Poland --
  - name: Indeed PL — PR
    query: 'site:pl.indeed.com "PR Manager" OR "Communications Manager" OR "specjalista PR" Warszawa'
    enabled: true

  # -- Euractiv / EU institutions --
  - name: EU Institutions — Communications
    query: '"communications officer" OR "press officer" OR "spokesperson" site:epso.europa.eu OR site:eurobrussels.com OR site:euractiv.com/jobs'
    enabled: true

  # -- General cross-portal --
  - name: Cross-portal — Head of Comms Poland
    query: '"Head of Communications" OR "Communications Director" OR "Dyrektor ds. komunikacji" Warsaw OR Poland 2026'
    enabled: true

  - name: Cross-portal — Financial PR
    query: '"financial PR" OR "investor relations" OR "capital markets communications" OR "IR Manager" Warsaw OR Poland OR remote'
    enabled: true

